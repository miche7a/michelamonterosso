    var img = new Image();
    img.src = SVG_URL;
    var cvs = document.createElement("canvas");
    stage.appendChild(cvs);
    var ctx = cvs.getContext("2d");
    ctx.imageSmoothingEnabled = false;
    var W = stage.offsetWidth;
    var H = stage.offsetHeight;
    cvs.width = W; cvs.height = H;
    window.addEventListener("resize", function() {
      W = stage.offsetWidth; cvs.width = W;
      ctx.imageSmoothingEnabled = false;
    });
    var SW = creatureConfig.size;
    var SH = Math.round(creatureConfig.size * (31/27));
    var x = W * 0.3, dir = 1;
    var speed = creatureConfig.speed;
    var flipped = false, flipTick = 0;
    var FLIP_INTERVAL = creatureConfig.flipInterval;
    var state = "walk", stateTimer = 0, idleTimer = 0;
    var groundY = Math.floor((H - SH) / 2);
    function update() {
      stateTimer++; flipTick++;
      if (state !== "idle" && flipTick >= FLIP_INTERVAL) { flipped = !flipped; flipTick = 0; }
      if (state === "walk") {
        x += dir * speed;
        if (x > W - SW - 4) { x = W - SW - 4; dir = -1; }
        if (x < 4)           { x = 4;          dir =  1; }
        if (stateTimer > 200 && Math.random() < creatureConfig.idleChance) {
          state = "idle";
          idleTimer = creatureConfig.idleMinFrames + Math.floor(Math.random() * (creatureConfig.idleMaxFrames - creatureConfig.idleMinFrames));
          stateTimer = 0;
        }
      } else if (state === "idle") {
        idleTimer--;
        flipTick = 0; flipped = false;
        if (idleTimer <= 0) { state = "walk"; stateTimer = 0; }
      }
    }
    function render() {
      ctx.clearRect(0, 0, W, H);
      var drawX = Math.round(x);
      var drawY = groundY;
      ctx.save();
      if (flipped) {
        ctx.translate(drawX + SW, drawY);
        ctx.scale(-1, 1);
      } else {
        ctx.translate(drawX, drawY);
      }
      ctx.drawImage(img, 0, 0, SW, SH);
      ctx.restore();
      update();
      requestAnimationFrame(render);
    }
    img.onload = function() { requestAnimationFrame(render); };
  })();

  /* ── PROJECT LIST ── */
  function renderProjects() {
    var list = document.getElementById('project-list');
    if (!list) return;
    var cols = document.querySelectorAll('.index-head .index-col');
    if (cols[2]) cols[2].style.display = showType ? '' : 'none';
    if (cols[3]) cols[3].style.display = showYear ? '' : 'none';
    if (typeof PROJECTS === "undefined") return;
    list.innerHTML = PROJECTS.map(function(p, i) {
      var num  = String(i + 1).padStart(2, '0');
      var type = showType ? '<span class="row-type">' + p.type + '</span>' : '';
      var year = showYear ? '<span class="row-year">' + p.year + '</span>' : '';
      return '<a class="index-row" href="' + p.href + '">' +
        '<span class="row-num">' + num + '</span>' +
        '<span class="row-title">' + p.title + '</span>' +
        type + year + '</a>';
    }).join('');
  }
  renderProjects();

  /* ── ASCII LOADER ── */
  (function() {
    var pat = loaderConfig.pattern;
    var LEN = loaderConfig.length;
    var spd = loaderConfig.speed;
    var t = 0;
    function tick() {
      t++;
      var offset = Math.floor(t / spd) % pat.length;
      var full = '';
      for (var i = 0; i < LEN + pat.length; i++) full += pat[i % pat.length];
      var bar = document.getElementById('ascii-bar');
      if (bar) bar.textContent = full.slice(offset, offset + LEN);
      requestAnimationFrame(tick);
    }
    window.showLoader = function(href) {
      if (!loaderConfig.enabled) { window.location.href = href; return; }
      var loader = document.getElementById('ascii-loader');
      if (!loader) { window.location.href = href; return; }
      loader.classList.add('active');
      t = 0; tick();
      setTimeout(function() { window.location.href = href; }, loaderConfig.duration);
    };
  })();
